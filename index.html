<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Quota Monitor</title>
  <style>
    :root {
      --app-bg: #f5f1e8;
      --card-bg: #fffaf0;
      --plot-bg: #fffdfa;
      --text: #1d1d1f;
      --muted: #5f6368;
      --grid: #e8dfcf;
      --border: #ebe2d0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--app-bg);
      color: var(--text);
      font-family: "Aptos", "Segoe UI", "Helvetica Neue", sans-serif;
    }
    main {
      min-height: 100vh;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 10px;
    }
    header {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 14px;
      align-items: start;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }
    .subtitle, .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .controls {
      display: grid;
      gap: 8px;
    }
    select {
      width: 100%;
      background: #ece4d3;
      border: 1px solid #d7cfbf;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font: inherit;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }
    .metric, .chart-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .metric {
      min-height: 100px;
      padding: 16px;
    }
    .metric-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 8px;
    }
    .metric-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      word-break: break-word;
    }
    .charts {
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(3, minmax(150px, 1fr));
      gap: 10px;
    }
    .chart-card {
      min-height: 150px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
    }
    .chart-title {
      font-size: 17px;
      font-weight: 700;
    }
    .chart-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .legend-swatch {
      width: 18px;
      height: 3px;
      border-radius: 999px;
      display: inline-block;
    }
    svg {
      width: 100%;
      height: 100%;
      min-height: 90px;
      display: block;
      background: var(--plot-bg);
    }
    .axis, .axis text {
      fill: var(--muted);
      font-size: 12px;
    }
    .axis path, .axis line {
      stroke: #dfd6c3;
    }
    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
      stroke-dasharray: 4 5;
    }
    .latest-label {
      font-size: 13px;
      font-weight: 700;
      paint-order: stroke;
      stroke: var(--card-bg);
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .empty {
      fill: var(--muted);
      font-size: 14px;
      text-anchor: middle;
    }
    @media (max-width: 980px) {
      main { min-height: auto; }
      header { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .charts { grid-template-rows: repeat(3, 240px); }
      .chart-heading { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

      </div>
    </header>

    <section class="status" id="status"></section>
    <section class="charts" id="charts"></section>
  </main>

        if (y <= margin.top || y >= margin.top + plotH) continue;
        add("line", { class: "grid-line", x1: margin.left, x2: margin.left + plotW, y1: y, y2: y });
        const text = add("text", { class: "axis", x: margin.left - 8, y: y + 4, "text-anchor": "end" });
        text.textContent = tick.toFixed(Number.isInteger(tick) ? 0 : 1);
      }

      for (const tick of xTicks) {
        const x = sx(tick);
        if (x <= margin.left || x >= margin.left + plotW) continue;
        add("line", { x1: x, x2: x, y1: margin.top, y2: margin.top + plotH, stroke: "#f2ecdf", "stroke-width": 1 });
        const text = add("text", { class: "axis", x, y: margin.top + plotH + 20, "text-anchor": "middle" });
        text.textContent = formatTime(tick, chart.windowSeconds);
      }

      add("line", { x1: margin.left, x2: margin.left + plotW, y1: margin.top + plotH, y2: margin.top + plotH, stroke: "#dfd6c3" });
      add("line", { x1: margin.left, x2: margin.left, y1: margin.top, y2: margin.top + plotH, stroke: "#dfd6c3" });

      const yLabel = add("text", { class: "axis", x: 16, y: margin.top + plotH / 2, transform: `rotate(-90 16 ${margin.top + plotH / 2})`, "text-anchor": "middle" });
      yLabel.textContent = "Remaining %";

      if (!points.length) {
        const empty = add("text", { class: "empty", x: margin.left + plotW / 2, y: margin.top + plotH / 2 });
        empty.textContent = "No samples yet";
        return;
      }

      const baselineY = margin.top + plotH;
      const areaPath = [
        `M ${sx(points[0].x)} ${baselineY}`,
        ...points.map((p) => `L ${sx(p.x)} ${sy(p.y)}`),
        `L ${sx(points[points.length - 1].x)} ${baselineY}`,
        "Z",
      ].join(" ");
      add("path", { d: areaPath, fill: chart.color, opacity: 0.14 });

      const linePath = points.map((p, idx) => `${idx ? "L" : "M"} ${sx(p.x)} ${sy(p.y)}`).join(" ");
      add("path", { d: linePath, fill: "none", stroke: chart.color, "stroke-width": 2.5, "stroke-linejoin": "round", "stroke-linecap": "round" });

      for (const p of points) {
        add("circle", { cx: sx(p.x), cy: sy(p.y), r: 3.5, fill: chart.color });
      }

      const latest = points[points.length - 1];
      const label = add("text", {
        class: "latest-label",
        x: margin.left + plotW + margin.right - 14,
        y: Math.max(margin.top + 12, Math.min(margin.top + plotH - 8, sy(latest.y))),
        fill: chart.color,
        "text-anchor": "end",
      });
      label.textContent = `${latest.y.toFixed(1)}%`;
    }

    function drawSpeedChart(chart) {
      const svg = chart.svg;
      const width = Math.max(640, Math.round(svg.clientWidth || 1000));
      const height = Math.max(140, Math.round(svg.clientHeight || 220));
      const margin = { top: 12, right: 110, bottom: 30, left: 64 };
      const plotW = width - margin.left - margin.right;
      const plotH = height - margin.top - margin.bottom;
      const generatedAt = timeMs(payload.generatedAt);
      const cutoff = generatedAt - chart.windowSeconds * 1000;
      const seriesList = chart.series.map((series) => ({
        ...series,
        values: series.points
          .map((p) => ({ x: timeMs(p.ts), y: Number(p.speed) }))
          .filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y) && p.x >= cutoff)
          .sort((a, b) => a.x - b.x),
      }));
      const allPoints = seriesList.flatMap((series) => series.values);
      const [xLow, xHigh] = resolveXRange(allPoints, chart.windowSeconds);
      const [yLow, yHigh] = resolveSpeedYRange(allPoints.map((p) => p.y));

      const sx = (x) => margin.left + ((x - xLow) / (xHigh - xLow)) * plotW;
      const sy = (y) => margin.top + (1 - (y - yLow) / (yHigh - yLow)) * plotH;
      const yTicks = buildTicks(yLow, yHigh, Math.max(3, Math.floor(plotH / 42)));
      const xTicks = buildTicks(xLow, xHigh, Math.max(3, Math.floor(plotW / 170)));

      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svg.innerHTML = "";

      const add = (name, attrs, parent = svg) => {
        const el = document.createElementNS("http://www.w3.org/2000/svg", name);
        for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
        parent.appendChild(el);
        return el;
      };

      add("rect", { x: 0, y: 0, width, height, fill: "#fffdfa" });

      for (const tick of yTicks) {
        const y = sy(tick);
        if (y <= margin.top || y >= margin.top + plotH) continue;
        add("line", { class: "grid-line", x1: margin.left, x2: margin.left + plotW, y1: y, y2: y });
        const text = add("text", { class: "axis", x: margin.left - 8, y: y + 4, "text-anchor": "end" });
        text.textContent = tick.toFixed(Math.abs(tick) < 10 ? 1 : 0);
      }

      for (const tick of xTicks) {
        const x = sx(tick);
        if (x <= margin.left || x >= margin.left + plotW) continue;
        add("line", { x1: x, x2: x, y1: margin.top, y2: margin.top + plotH, stroke: "#f2ecdf", "stroke-width": 1 });
        const text = add("text", { class: "axis", x, y: margin.top + plotH + 20, "text-anchor": "middle" });
        text.textContent = formatTime(tick, chart.windowSeconds);
      }

      add("line", { x1: margin.left, x2: margin.left + plotW, y1: margin.top + plotH, y2: margin.top + plotH, stroke: "#dfd6c3" });
      add("line", { x1: margin.left, x2: margin.left, y1: margin.top, y2: margin.top + plotH, stroke: "#dfd6c3" });

      const yLabel = add("text", { class: "axis", x: 16, y: margin.top + plotH / 2, transform: `rotate(-90 16 ${margin.top + plotH / 2})`, "text-anchor": "middle" });
      yLabel.textContent = "% / hour";

      if (!allPoints.length) {
        const empty = add("text", { class: "empty", x: margin.left + plotW / 2, y: margin.top + plotH / 2 });
        empty.textContent = "Need at least two samples in a 15 minute window";
        return;
      }

      seriesList.forEach((series, index) => {
        if (!series.values.length) return;
        const linePath = series.values.map((p, idx) => `${idx ? "L" : "M"} ${sx(p.x)} ${sy(p.y)}`).join(" ");
        add("path", { d: linePath, fill: "none", stroke: series.color, "stroke-width": 2.4, "stroke-linejoin": "round", "stroke-linecap": "round" });
        const latest = series.values[series.values.length - 1];
        add("circle", { cx: sx(latest.x), cy: sy(latest.y), r: 4, fill: series.color });
        const label = add("text", {
          class: "latest-label",
          x: margin.left + plotW + margin.right - 14,
          y: Math.max(margin.top + 12, Math.min(margin.top + plotH - 8, sy(latest.y) + index * 16)),
          fill: series.color,
          "text-anchor": "end",
        });
        label.textContent = `${latest.y.toFixed(2)}%/h`;
      });
    }

    function drawAll() {
      for (const chart of payload.charts) drawChart(chart);
      for (const chart of payload.speedCharts || []) drawSpeedChart(chart);
    }

    yModeSelect.addEventListener("change", drawAll);
    window.addEventListener("resize", drawAll);
    drawAll();
    window.setTimeout(() => window.location.reload(), Math.max(30, payload.pollIntervalSeconds) * 1000);
  </script>
</body>
</html>
